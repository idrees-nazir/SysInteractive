name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload via SFTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "${{ secrets.SFTP_USER }},${{ secrets.SFTP_PASSWORD }}" \
            -e "set sftp:auto-confirm yes; set ssl:verify-certificate no; mirror -R --verbose --delete --parallel=4 ./out/ /sysinteractive/; quit" \
            sftp://${{ secrets.SFTP_HOST }}
